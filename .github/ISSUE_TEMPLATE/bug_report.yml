name: Bug Report
description: Report a problem or issue with FaultNet
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue! Please provide as much detail as possible to help us understand and resolve the problem.

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where are you using FaultNet?
      options:
        - Desktop Web Browser
        - Mobile Web Browser (iOS Safari)
        - Mobile Web Browser (Android Chrome)
        - Mobile Web Browser (Other)
        - Tablet
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & Version
      description: What browser and version are you using?
      placeholder: e.g., Chrome 131, Safari 17.4, Firefox 125
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device & OS
      description: What device and operating system?
      placeholder: e.g., iPhone 15 Pro (iOS 18.2), Samsung Galaxy S24 (Android 15), Windows 11
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      description: What version of FaultNet? (Found in the app sidebar / x-api-version header in API responses)
      placeholder: e.g., v0.0.32
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe what went wrong
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem. You can drag and drop images here.
      placeholder: Drag and drop screenshots here
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
      placeholder: Any other information that might be helpful
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Acknowledgements
      description: Please confirm the following
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided all requested information above
          required: true
