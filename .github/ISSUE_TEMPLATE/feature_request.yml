name: Feature Request
description: Suggest a new feature or improvement for FaultNet
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Your ideas help make FaultNet better for everyone.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem would this feature solve? Is your feature request related to a problem you're experiencing?
      placeholder: e.g., "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or improvement you'd like to see
      placeholder: A clear and concise description of what you want to happen
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would you use this feature? Provide a specific example or scenario
      placeholder: Describe a specific scenario where this feature would be helpful
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What area of FaultNet does this relate to?
      options:
        - Fault Cases
        - Vehicle Management
        - Search & Filtering
        - User Profile
        - DTC Codes
        - Timeline & Comments
        - Mobile Experience
        - Desktop Experience
        - Notifications
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or features?
      placeholder: Describe any alternative solutions or workarounds you've considered
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or screenshots about the feature request here
      placeholder: Any other information that might be helpful
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Acknowledgements
      description: Please confirm the following
      options:
        - label: I have searched existing issues to ensure this feature hasn't been requested before
          required: true
        - label: This feature would benefit other FaultNet users, not just me
          required: true
